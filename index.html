<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Harvard Device Recommendation Tool</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }

    .topbar {
      background: black;
      height: 87px;
      display: flex;
      align-items: center;
    }

    .topbar-container {
      width: 1200px;
      margin: auto;
    }

    .logo {
      height: 80px;
    }

    .page-container {
      width: 900px;
      margin: 60px auto;
      background: white;
      padding: 42px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      border-radius: 4px;
    }

    h1 {
      margin-top: 0;
      font-size: 32px;
      color: #222;
    }

    .subtitle {
      color: #666;
      margin-bottom: 30px;
    }

    .tool-box {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
    }

    input {
      flex: 1;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      background: #a6053b;
      color: white;
      border: none;
      padding: 12px 20px;
      font-size: 16px;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background: #8c1626;
    }

    #result {
      margin-top: 30px;
      padding: 25px;
      background: #fafafa;
      border: 1px solid #eee;
      border-radius: 4px;
    }

    .device {
      padding: 12px;
      background: #efefef;
      margin-top: 8px;
      border-radius: 4px;
    }
    
    .device a {
      color: #a6053b;
      text-decoration: none;
      font-weight: bold;
    }

    .device a:hover {
      text-decoration: underline;
    }

    .resultCard {
      margin-top: 10px;
      padding: 20px;
      background: #fafafa;
      border-left: 5px solid #A51C30;
      border-radius: 6px;
      overflow-wrap: break-word;
    }
    
    .warning-text {
      color: #b00;
      font-style: italic;
      font-weight: bold;
    }

    .persona-key {
      font-style: italic;
      color: #666;
      font-size: 13px;
      margin-top: 2px;
      display: block;
    }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="topbar-container">
      <img src="HarvardLogo.png" class="logo" alt="Harvard Logo">
    </div>
  </header>

  <div class="page-container">
    <h1>Device Refresh Tool</h1>
    <p class="subtitle">Enter your Harvard ID to view your recommended refresh device.</p>

    <div class="tool-box">
      <input type="text" id="harvardID" placeholder="Enter Harvard ID">
      <button id="lookupBtn" onclick="lookupUser()">Find My Recommendation</button>
    </div>

    <div id="result"></div>
  </div>

  <script>
    // This empty object will hold our users once the CSV is parsed
    const users = {};

    // GROUP 1: Academic & Administrative Professional Profiles
    const academicMatrix = {
      "core": {
        label: "Academic & Administrative Professional Users - Core",
        devices: [
          { name: "Dell Pro Plus 13/14 (Ultra 5, 32GB RAM, 512GB SSD)", url: "https://www.dell.com" },
          { name: "MacBook Air 14-inch (M5, 16GB RAM, 1TB SSD)", url: "https://www.apple.com/macbook-air/" }
        ]
      },
      "advanced": {
        label: "Academic & Administrative Professional Users - Advanced",
        devices: [
          { name: "Dell Pro Max 14/16 (Ultra 7, 32GB RAM, 512GB SSD)", url: "https://www.dell.com" },
          { name: "MacBook Pro 14-inch (M5 Pro, 24GB RAM, 1TB SSD)", url: "https://www.apple.com/shop/buy-mac/macbook-pro" }
        ]
      },
      "fixed": {
        label: "Academic & Administrative Professional Users - Fixed",
        devices: [
          { name: "Dell Pro Slim Desktop / All-in-One 25", url: "https://www.dell.com" },
          { name: "iMac 24-inch (M5 Pro, 24GB RAM, 1TB SSD)", url: "https://www.apple.com/shop/buy-mac/imac" }
        ]
      },
      "mobile": {
        label: "Academic & Administrative Professional Users - Mobile",
        devices: [
          { name: "Dell Pro 13 Premium (Ultra 5, 32GB RAM, 512GB SSD)", url: "https://www.dell.com" },
          { name: "MacBook Air 13-inch (M5, 16GB RAM, 1TB SSD)", url: "https://www.apple.com/macbook-air/" }
        ]
      }
    };

    // GROUP 2: Power & Specialist Profiles
    const powerMatrix = {
      "core": {
        label: "Power & Specialist Users - Core",
        devices: [
          { name: "Dell Pro Max Premium 14/16 (Ultra 7, 32GB RAM, 512GB SSD)", url: "https://www.dell.com" },
          { name: "MacBook Pro 14/16-inch (M5 Pro, 24GB RAM, 1TB SSD)", url: "https://www.apple.com/shop/buy-mac/macbook-pro" }
        ]
      },
      "advanced": {
        label: "Power & Specialist Users - Advanced",
        devices: [
          { name: "Dell Pro Max Plus 16/18 (Ultra 7/9, 32GB RAM, 512GB SSD)", url: "https://www.dell.com" },
          { name: "MacBook Pro 16-inch (M5 Max, 36GB RAM, 1TB SSD)", url: "https://www.apple.com/shop/buy-mac/macbook-pro" }
        ]
      }
    };

    // POLICY ENGINE: Map Job Codes to a Primary Group and Sub-Profile
    const jobCodeRules = {
      "I0756M": { mainGroup: "academic", subProfile: "core" },       // Admin Mgr -> Academic Core
      "I0858P": { mainGroup: "power", subProfile: "advanced" },      // Sr. Systems Analyst -> Power Advanced
      "Software Engineer": { mainGroup: "power", subProfile: "advanced" }
    };

    // Your raw employee data string
    const csvText = `
Harvard ID,Name,classdescription,jobcode,businesstitle
60846642,Eric Thompson,Admin & Professional,I0756M,Associate Director Endpoint Solutions
60917469,Bailey Andrews,Admin & Professional,IT Program Manager V,IT Program Manager Endpoint Solutions
81401640,Jenn Vasconcelos,Admin & Professional,I0756M,Associate Director Client Services PMO
71775372,Samantha Diaz,Admin & Professional,Administrative/Refresh Coordinator,IT Procurement and Refresh
80849052,Brian Weeks,Admin & Professional,I0858P,Associate Systems Engineer
11276555,Junda Sun,Admin & Professional,Software Engineer,Associate Systems Engineer
`.trim();

    // Loops through the raw text rows and builds clean user profiles
    function loadUsersFromCSV() {
      const lines = csvText.split("\n");

      for (let i = 1; i < lines.length; i++) {
        const line = lines[i].trim();
        if (line === "") continue;

        const cols = line.split(",");
        const id = cols[0].trim();
        
        users[id] = {
          name: cols[1].trim(),
          classdescription: cols[2].trim(),
          jobCode: cols[3].trim(),
          businesstitle: cols[4].trim()
        };
      }
      console.log("Roster processed successfully.");
    }

    // Handles looking up a user and printing their recommendation card
    function lookupUser() {
      const idInput = document.getElementById("harvardID");
      const resultDiv = document.getElementById("result");
      const id = idInput.value.trim();

      if (id === "") {
        resultDiv.innerHTML = "<p>Please enter a Harvard ID.</p>";
        return;
      }

      let user = users[id];
      
      // Setup our fallbacks in case things are missing >,<
      let selectedGroup = "academic";
      let selectedSubProfile = "core";
      let safetyNetUsed = false;
      let reasonForSafetyNet = "";

      if (!user) {
        safetyNetUsed = true;
        reasonForSafetyNet = "User record not found in HR roster. Default baseline profile applied.";
        user = {
          name: "Unknown User",
          classdescription: "N/A",
          jobCode: "N/A",
          businesstitle: "N/A"
        };
      } else {
        // User exists! Let's check if their job code has explicit mapping rules (yay if you are reading this you rock btw!)
        const rule = jobCodeRules[user.jobCode];
        
        if (rule) {
          selectedGroup = rule.mainGroup;
          selectedSubProfile = rule.subProfile;
        } else {
          safetyNetUsed = true;
          reasonForSafetyNet = `Job code [${user.jobCode}] has no specific rule. Default baseline profile applied.`;
        }
      }

      // Read from our separated groupings arrays based on the rule
      let finalPersona;
      if (selectedGroup === "power") {
        finalPersona = powerMatrix[selectedSubProfile];
      } else {
        finalPersona = academicMatrix[selectedSubProfile];
      }

      const devices = finalPersona.devices;

      //display card
      let html = "<div class='resultCard'>";
      html += "<h3>User Account Details</h3>";
      html += "<p><b>Harvard ID:</b> " + id + "</p>";
      html += "<p><b>Full Name:</b> " + user.name + "</p>";
      html += "<p><b>Class:</b> " + user.classdescription + "</p>";
      html += "<p><b>Job Code:</b> " + user.jobCode + "</p>";
      html += "<p><b>Business Title:</b> " + user.businesstitle + "</p>";

      if (safetyNetUsed) {
        html += "<p class='warning-text'>⚠️ " + reasonForSafetyNet + "</p>";
      }

      html += "<hr style='border:0; border-top: 1px solid #ddd; margin:20px 0;'>";
      
      // Render Persona details with the backend system key directly below it in italics!
      html += "<h3>Persona Profile</h3>";
      html += "<p><b>Persona:</b> " + finalPersona.label + "</p>";
      html += "<span class='persona-key'>System Lookup Key: " + selectedGroup + "-" + selectedSubProfile + "</span>";

      // Render the allowed hardware list
      html += "<h3>Device Recommendation</h3>";
      for (let i = 0; i < devices.length; i++) {
        const device = devices[i];
        html += "<div class='device'>";
        html += "🔹 <a href='" + device.url + "' target='_blank'>" + device.name + "</a>";
        html += "</div>";
      }
      html += "</div>";

      resultDiv.innerHTML = html;
    }

    // Run our data setup immediately when the page loads
    loadUsersFromCSV();

    // Listen for the Enter key press in the input field
    document.getElementById("harvardID").addEventListener("keypress", function (event) {
      if (event.key === "Enter") {
        event.preventDefault();
        lookupUser();
      }
    });
  </script>
</body>

</html>
